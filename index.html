<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Last Circle Leaderboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #222 0%, #000 60%);
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: rgba(20, 20, 20, 0.9);
      border-radius: 16px;
      padding: 24px 32px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
      max-width: 480px;
      width: 100%;
    }

    .title {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    .leaderboard {
      width: 100%;
      border-collapse: collapse;
    }

    .leaderboard th,
    .leaderboard td {
      padding: 10px 8px;
      text-align: left;
    }

    .leaderboard th {
      border-bottom: 2px solid #444;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .leaderboard tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.03);
    }

    .leaderboard tr:nth-child(1) td {
      color: #ffd700;
      font-weight: bold;
    }

    .leaderboard tr:nth-child(2) td {
      color: #c0c0c0;
      font-weight: bold;
    }

    .leaderboard tr:nth-child(3) td {
      color: #cd7f32;
      font-weight: bold;
    }
